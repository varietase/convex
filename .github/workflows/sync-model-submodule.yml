name: Sync submodules

# Keeps the `model` and `client` submodule pointers following each repo's
# main branch (set via `branch = main` in .gitmodules).
# Triggers:
#   - manual button (Actions tab -> this workflow -> Run workflow)
#   - every 6 hours as a safety net
on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

# Allow the built-in GITHUB_TOKEN to push the pointer-bump commit.
permissions:
  contents: write

concurrency:
  group: sync-submodules
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out convex with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Advance submodules to their tracked main branches
        run: git submodule update --remote --init

      - name: Commit and push if any pointer moved
        run: |
          if git diff --quiet -- model client; then
            echo "submodules already at their latest main — nothing to do."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: bump submodules to latest main" -- model client
          git push
